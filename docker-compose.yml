# Per-project compose for running FE in isolation during development.
# For full-stack orchestration use the root docker-compose.yml.

services:
  fe:
    image: ${FULL_IMAGE_NAME}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fe-extension-erp
    environment:
      # Runtime config: injected into window.__ENV__ by the container
      # entrypoint at startup. Change this and restart the container —
      # NO rebuild needed.
      API_BASE_URL: ${API_BASE_URL:-https://api-extension-hm.ethos.co.id/api}
    ports:
      - "${FE_HOST_PORT:-9194}:80"
    restart: unless-stopped
