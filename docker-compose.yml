version: '3.8'

services:
  # --- FRONTEND APPLICATION ---
  fe:
    container_name: fe-extension-erp-dev
    # PENTING: Gunakan variable ini agar Docker mengambil image yg dipush Jenkins
    image: ${FULL_IMAGE_NAME}
    restart: unless-stopped
    ports:
      - "${FE_HOST_PORT:-9194}:80"

    # Runtime config: injected into window.__ENV__ by the container
    # entrypoint at startup. Change this and restart the container — NO rebuild needed.
    environment:
      API_BASE_URL: ${API_BASE_URL:-https://api-extension-hm.ethos.co.id/api}

    networks:
      - fe-extension-network

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  fe-extension-network:
    driver: bridge
